<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Automated Portfolio</title>
    <style>
        /* Modern Minimalist Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Rachana's Space 🚀</h1>
        <p>Welcome to my official website! This page is fully automated and deploys on its own using a GitHub Actions CI/CD pipeline.</p>
        <span class="badge">CI/CD Pipeline: Active</span>
    </div>

</body>
</html>
