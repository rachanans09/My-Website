name: Deploy Website to Render Server

on:
  push:
    branches:
      - main

jobs:
  # Stage 1: Continuous Integration (CI) - Lint/Check Code
  test_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Super-Fast HTML Hint Check
        run: |
          npm install -g htmlhint
          htmlhint index.html

  # Stage 2: Continuous Deployment (CD) - Live Push to Render Server
  deploy_to_render:
    needs: test_code
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Server Update
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"