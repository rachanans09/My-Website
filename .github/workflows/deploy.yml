name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the pipeline every time you push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the root folder to the server

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        